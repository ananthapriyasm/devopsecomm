<div class="min-h-screen bg-gray-100 p-8">

  <h1 class="text-4xl font-bold text-center mb-10">
    Products
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <div
      *ngFor="let product of products"
      class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300"
    >

      <img
        src="https://picsum.photos/300/200"
        alt="Product"
        class="w-full h-48 object-cover"
      >

      <div class="p-4">

        <h2 class="text-xl font-semibold">
          {{product.name}}
        </h2>

        <p class="text-green-600 text-lg font-bold mt-2">
          ₹{{product.price}}
        </p>

        <button
          class="w-full mt-4 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
        >
          Add To Cart
        </button>

      </div>

    </div>

  </div>

</div>
